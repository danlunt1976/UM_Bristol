name: Update README Recent Updates

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/scripts/update_recent.py'
      - '.github/workflows/update-readme.yml'

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip readme]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Recent Updates section
        run: python3 .github/scripts/update_recent.py

      - name: Commit and push if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update Recent Updates section [skip readme]"
          git pull --rebase
          git push
